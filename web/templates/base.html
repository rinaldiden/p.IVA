<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FiscalAI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% block nav %}
    <nav>
        <div class="{% block nav_width %}container{% endblock %}">
            <a href="/" class="logo">FiscalAI <span>p.IVA</span></a>
            {% block nav_right %}{% endblock %}
        </div>
    </nav>
    {% endblock %}

    {% block body %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% endblock %}

    <footer>
        FiscalAI — Non sostituisce consulenza professionale certificata.
    </footer>

    <script src="{{ url_for('static', filename='wizard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
