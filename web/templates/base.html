<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FiscalAI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">FiscalAI <span>p.IVA</span></a>
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/nuova-piva" class="nav-link">+ Nuova P.IVA</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            FiscalAI — Sistema di supporto fiscale autonomo per forfettari.
            Non sostituisce la consulenza professionale.
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
